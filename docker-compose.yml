services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_data:/data

  worker:
    build: ./worker
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      WORKER_URL: http://worker:8000
      NEO4J_URI: bolt://neo4j:7687
      MOCK_MODE: ${MOCK_MODE:-true}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    depends_on:
      - worker
      - neo4j

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  neo4j_data:
